name: 건설 뉴스 보드 자동 갱신

on:
  schedule:
    # cron 은 UTC 기준입니다 (한국시간 -9시간).
    #
    # 실제 기사 발행 시각을 조사한 결과(주요 언론사 261건, 평일 기준):
    #   07시까지 누적 14.9% / 09시 40건 / 10시 29건 / 14시 23건 / 18시까지 92.7%
    #   건설 관련 기사는 14시(17건)와 10시(17건)에 가장 많이 나옴
    #
    # 그래서 두 번 돌립니다.
    - cron: "0 22 * * *"   # 07:00 KST - 아침 브리핑 (전날 저녁~새벽 기사)
    - cron: "30 6 * * 1-5" # 15:30 KST 평일 - 오전 피크 + 14시 건설 피크 반영
  workflow_dispatch: # Actions 탭에서 수동 실행용

# data.js 를 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # secrets 컨텍스트는 step 의 if 조건에서 쓸 수 없어 job 레벨 env 로 올립니다.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 준비
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 아침·오후 모두 항상 갱신하고 커밋합니다.
      # (오후 화면이 "몇 시 기준"인지 사용자가 알 수 있어야 하므로,
      #  기사가 그대로여도 갱신 시각은 최신으로 유지합니다)
      - name: 뉴스 수집 및 data.js 생성
        id: build
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
        run: |
          rm -f email.html notify.txt
          python scripts/build_news.py
          echo "updated=yes" >> "$GITHUB_OUTPUT"

      - name: 변경사항 커밋
        if: steps.build.outputs.updated == 'yes'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 데이터 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi

      - name: 메일 제목 준비
        id: headline
        if: steps.build.outputs.updated == 'yes'
        run: |
          {
            echo 'text<<__EOF__'
            cat notify.txt
            echo
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      # 메일 발송 — 시크릿 3개가 설정된 경우에만 동작합니다.
      # MAIL_USERNAME / MAIL_PASSWORD(Gmail 앱 비밀번호) / MAIL_TO
      - name: 브리핑 메일 발송
        if: env.MAIL_USERNAME != '' && steps.build.outputs.updated == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: 건설뉴스 보드
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.headline.outputs.text }}
          html_body: file://email.html
          convert_markdown: false
