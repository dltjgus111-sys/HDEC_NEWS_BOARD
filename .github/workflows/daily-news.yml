name: 건설 뉴스 보드 자동 갱신

on:
  # [2026-07-20] GitHub 자체 schedule: 을 시도했으나 대기열 지연이 커서
  # (15:30 예정 -> 18:42, 3시간 12분 지연 실측) 여기서 뺐습니다.
  #
  # 대신 외부 스케줄러(cron-job.org)가 아래 workflow_dispatch 를 REST API 로
  # 정확한 시각에 호출합니다(4~40초 오차). 설정 방법은
  # cron-job_org_설정하기.md 참고. 실행 자체는 여기와 완전히 동일합니다
  # (같은 파이썬 스크립트, 같은 커밋 로직) — 방아쇠만 밖에서 당길 뿐입니다.
  #
  # 외부 스케줄러가 통째로 멈추는 경우를 대비해 최소한의 자체 안전망 하나만
  # 남겨둡니다(하루 1번, 한산한 시각). 평소엔 외부 호출이 이보다 먼저 돌기
  # 때문에 이 실행은 대개 "변경 없음"으로 조용히 끝납니다.
  schedule:
    - cron: "13 20 * * *"   # 05:13 KST - 안전망 1일 1회 (외부 스케줄러 전면 장애 대비)
  workflow_dispatch: # cron-job.org 및 Actions 탭 수동 실행용

# data.js 를 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # secrets 컨텍스트는 step 의 if 조건에서 쓸 수 없어 job 레벨 env 로 올립니다.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 준비
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 아침·오후 모두 항상 갱신하고 커밋합니다.
      # (오후 화면이 "몇 시 기준"인지 사용자가 알 수 있어야 하므로,
      #  기사가 그대로여도 갱신 시각은 최신으로 유지합니다)
      - name: 뉴스 수집 및 data.js 생성
        id: build
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
        run: |
          rm -f email.html notify.txt
          python scripts/build_news.py
          echo "updated=yes" >> "$GITHUB_OUTPUT"

      - name: 변경사항 커밋
        if: steps.build.outputs.updated == 'yes'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 데이터 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi

      - name: 메일 제목 준비
        id: headline
        if: steps.build.outputs.updated == 'yes'
        run: |
          {
            echo 'text<<__EOF__'
            cat notify.txt
            echo
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      # 메일 발송 — 시크릿 3개가 설정된 경우에만 동작합니다.
      # MAIL_USERNAME / MAIL_PASSWORD(Gmail 앱 비밀번호) / MAIL_TO
      - name: 브리핑 메일 발송
        if: env.MAIL_USERNAME != '' && steps.build.outputs.updated == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: 건설뉴스 보드
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.headline.outputs.text }}
          html_body: file://email.html
          convert_markdown: false
