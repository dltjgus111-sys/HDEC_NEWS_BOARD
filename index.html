<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>건설 뉴스 브리핑 보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #F5F6F8;
            --card: #ffffff;
            --line: #E7E9EF;
            --text: #191C24;
            --muted: #79808F;
            --brand: #008C46;
            --brand-soft: #E8F5EE;

            --c-order: #008C46;
            --c-industry: #2563EB;
            --c-economy: #E8760C;
            --c-geo: #7C3AED;

            --up: #D62B39;
            --down: #1667D6;

            --radius: 16px;
            --shadow: 0 2px 4px rgba(20, 25, 40, .04), 0 12px 28px rgba(20, 25, 40, .06);
            --content: min(1120px, calc(100vw - 40px));
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            -webkit-font-smoothing: antialiased;
            word-break: keep-all;
            padding-bottom: 64px;
        }

        .wrap { width: var(--content); margin: 0 auto; }

        /* ============ 상단 바 ============ */
        .topbar {
            width: var(--content);
            margin: 0 auto;
            padding: 18px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: -.02em;
        }

        .logo .mark {
            background: var(--brand);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 5px 9px;
            border-radius: 7px;
            letter-spacing: .04em;
        }

        .tools { margin-left: auto; display: flex; gap: 7px; flex-wrap: wrap; }

        .tool {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 9px;
            padding: 8px 13px;
            font-size: 12.5px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .tool:hover { border-color: var(--brand); color: var(--brand); }

        select.tool { padding-right: 28px; appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'><path d='M1 3l4 4 4-4' stroke='%2379808F' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
            background-repeat: no-repeat; background-position: right 11px center; }

        /* ============ 헤더 ============ */
        .hero {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 34px 26px;
        }

        .hero .kicker {
            display: inline-block;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .1em;
            color: var(--brand);
            background: var(--brand-soft);
            padding: 5px 11px;
            border-radius: 999px;
        }

        .hero h1 {
            margin: 15px 0 0;
            font-size: clamp(21px, 2.6vw, 30px);
            font-weight: 900;
            letter-spacing: -.035em;
            line-height: 1.4;
        }

        .hero .sub {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
        }

        /* 지표 4칸 */
        .stats {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .stat {
            background: #FAFBFC;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 15px 16px;
        }

        .stat .k { font-size: 11.5px; font-weight: 700; color: var(--muted); }

        .stat .v {
            margin-top: 8px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -.04em;
            line-height: 1;
        }

        .stat .v span { font-size: 12px; font-weight: 700; color: var(--muted); margin-left: 3px; }

        .stat .d { margin-top: 8px; font-size: 11.5px; font-weight: 800; }
        .stat .d.up { color: var(--up); }
        .stat .d.down { color: var(--down); }
        .stat .d.flat { color: var(--muted); }
        .stat .n { margin-top: 4px; font-size: 10.5px; color: var(--muted); font-weight: 500; }

        /* ============ 필터 칩 ============ */
        .chips { margin: 26px 0 18px; display: flex; gap: 8px; flex-wrap: wrap; }

        .chip {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 999px;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: all .15s;
        }

        .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .chip:hover { border-color: #C9CEDA; }
        .chip.on { background: var(--text); border-color: var(--text); color: #fff; }
        .chip.on .dot { background: var(--chipc, #fff); }

        /* ============ 카테고리 섹션 ============ */
        .sec { margin-bottom: 34px; }
        .sec.hide { display: none; }

        .sec-head {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 14px;
        }

        .sec-head .ic {
            width: 34px; height: 34px;
            border-radius: 10px;
            display: grid; place-items: center;
            font-size: 17px;
            background: var(--secsoft);
        }

        .sec-head h2 {
            margin: 0;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: -.03em;
        }

        .sec-head .cnt {
            font-size: 12px;
            font-weight: 800;
            color: var(--sec);
            background: var(--secsoft);
            padding: 3px 9px;
            border-radius: 999px;
        }

        .sec-head .rule { flex: 1; height: 1px; background: var(--line); }

        /* ============ 카드 ============ */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .18s ease, box-shadow .18s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(20, 25, 40, .05), 0 18px 40px rgba(20, 25, 40, .1);
        }

        /* 카드 상단 비주얼 — RSS에 기사 이미지가 없어 카테고리 그래픽으로 대체 */
        .thumb {
            height: 132px;
            position: relative;
            display: grid;
            place-items: center;
            background: var(--secsoft);
            overflow: hidden;
        }

        .thumb::before {
            content: "";
            position: absolute;
            width: 190px; height: 190px;
            border-radius: 50%;
            background: var(--sec);
            opacity: .07;
            top: -70px; right: -50px;
        }

        .thumb::after {
            content: "";
            position: absolute;
            width: 120px; height: 120px;
            border-radius: 32px;
            background: var(--sec);
            opacity: .05;
            bottom: -50px; left: -30px;
            transform: rotate(22deg);
        }

        .thumb .big {
            font-size: 42px;
            filter: saturate(1.05);
            position: relative;
            z-index: 1;
        }

        .thumb .press {
            position: absolute;
            left: 13px; bottom: 12px;
            background: rgba(255, 255, 255, .95);
            border: 1px solid rgba(0, 0, 0, .05);
            color: var(--sec);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 999px;
            z-index: 2;
            max-width: calc(100% - 26px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .thumb .hot {
            position: absolute;
            right: 12px; top: 12px;
            background: var(--up);
            color: #fff;
            font-size: 10.5px;
            font-weight: 900;
            padding: 4px 9px;
            border-radius: 999px;
            z-index: 2;
            letter-spacing: .02em;
        }

        .card-body {
            padding: 18px 20px 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card .num {
            display: inline-grid;
            place-items: center;
            width: 24px; height: 24px;
            border-radius: 7px;
            background: var(--sec);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            margin-bottom: 11px;
        }

        .card h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.55;
            letter-spacing: -.025em;
        }

        .card .meta {
            margin-top: 12px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--muted);
        }

        .card .go {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
            font-size: 12.5px;
            font-weight: 800;
            color: var(--sec);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .card .go:hover { gap: 9px; }
        .card .go .arw { transition: transform .18s; }
        .card .go:hover .arw { transform: translateX(2px); }

        .empty {
            grid-column: 1 / -1;
            background: #fff;
            border: 1px dashed var(--line);
            border-radius: var(--radius);
            padding: 28px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        /* ============ 하단 ============ */
        .bottom { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; margin-top: 6px; }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 26px;
        }

        .panel h3 {
            margin: 0 0 14px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: -.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel ol { margin: 0; padding-left: 17px; }
        .panel ol li { font-size: 13px; line-height: 1.7; padding: 5px 0; font-weight: 500; }

        .panel.fc {
            background: linear-gradient(140deg, #0B6E39, #008C46);
            border: none;
            color: #fff;
        }

        .panel.fc h3 { color: rgba(255, 255, 255, .7); }
        .panel.fc p { margin: 0; font-size: 14.5px; font-weight: 700; line-height: 1.65; letter-spacing: -.02em; }

        .foot {
            width: var(--content);
            margin: 22px auto 0;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--muted);
        }

        .toast {
            position: fixed; left: 50%; bottom: 28px;
            transform: translateX(-50%) translateY(18px);
            background: var(--text); color: #fff;
            font-size: 13px; font-weight: 700;
            padding: 12px 22px; border-radius: 999px;
            opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s;
            z-index: 200;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 900px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .grid { grid-template-columns: 1fr; }
            .bottom { grid-template-columns: 1fr; }
        }

        @media (max-width: 560px) {
            :root { --content: calc(100vw - 24px); }
            .hero { padding: 24px 20px 20px; }
        }

        @media print {
            body { background: #fff; }
            .topbar, .chips, .foot, .toast, .card .go { display: none !important; }
            .card, .panel, .hero { box-shadow: none; break-inside: avoid; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <span class="logo"><span class="mark">HDEC</span>건설 뉴스 브리핑</span>
        <div class="tools">
            <select class="tool" id="dsel" title="지난 브리핑"></select>
            <button class="tool" id="bcopy">요약 복사</button>
            <button class="tool" id="bprint">인쇄 / PDF</button>
        </div>
    </div>

    <div class="wrap">
        <section class="hero">
            <span class="kicker" id="kicker">오늘의 핵심</span>
            <h1 id="hl">데이터를 불러오는 중…</h1>
            <div class="sub" id="sub"></div>
            <div class="stats" id="stats"></div>
        </section>

        <div class="chips" id="chips"></div>
        <div id="sections"></div>

        <div class="bottom">
            <div class="panel">
                <h3>📅 지난주 돌아보기</h3>
                <ol id="lw"></ol>
            </div>
            <div class="panel fc">
                <h3>🔭 다음주 전망</h3>
                <p id="ol">-</p>
            </div>
        </div>
    </div>

    <div class="foot">
        <span>매일 오전 GitHub Actions 자동 갱신 · 뉴스 출처 Google News (주요 언론사 한정)</span>
        <span id="cnt"></span>
    </div>

    <div class="toast" id="toast"></div>

    <script src="data.js" charset="utf-8"></script>
    <script>
        (function () {
            var DATA = (window.NEWS_DATA && Array.isArray(window.NEWS_DATA)) ? window.NEWS_DATA.slice() : [];

            var CAT = {
                order:    { icon: '🏆', name: '수주',        c: '#008C46', soft: '#E8F5EE' },
                industry: { icon: '🏗️', name: '건설업계',    c: '#2563EB', soft: '#E8F0FE' },
                economy:  { icon: '💰', name: '물가·경제',   c: '#E8760C', soft: '#FDF0E3' },
                geo:      { icon: '🌍', name: '지정학적 이슈', c: '#7C3AED', soft: '#F1EAFE' }
            };
            var ORDER = ['order', 'industry', 'economy', 'geo'];

            var $ = function (i) { return document.getElementById(i); };

            function esc(s) {
                return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            function safeUrl(u) {
                u = String(u == null ? '' : u).trim();
                return /^https?:\/\//i.test(u) ? u : '';
            }

            function fmtDate(iso) {
                var p = String(iso || '').split('-');
                if (p.length !== 3) return iso || '';
                var w = ['일', '월', '화', '수', '목', '금', '토'];
                return p[0] + '. ' + (+p[1]) + '. ' + (+p[2]) +
                    ' (' + w[new Date(+p[0], +p[1] - 1, +p[2]).getDay()] + ')';
            }

            /* 언론사·날짜가 "뉴시스 · 07/19" 형태로 합쳐져 있어 분리 */
            function splitSource(s) {
                var m = String(s || '').split('·');
                return { press: (m[0] || '').trim(), when: (m[1] || '').trim() };
            }

            function render(e) {
                if (!e) return;

                $('hl').textContent = e.headline || '(핵심 이슈 없음)';
                $('kicker').textContent =
                    e.date === new Date().toISOString().slice(0, 10) ? '오늘의 핵심' : '해당일 핵심';
                var n = ORDER.reduce(function (a, k) { return a + ((e.categories || {})[k] || []).length; }, 0);
                $('sub').textContent = fmtDate(e.date) +
                    (e.generatedAt ? ' · ' + e.generatedAt + ' 갱신' : '') + ' · 뉴스 ' + n + '건';

                // 지표
                $('stats').innerHTML = (e.indicators || []).map(function (i) {
                    var d = (i.dir === 'up' || i.dir === 'down') ? i.dir : 'flat';
                    var ar = d === 'up' ? '▲' : (d === 'down' ? '▼' : '—');
                    return '<div class="stat"><div class="k">' + esc(i.label) + '</div>'
                        + '<div class="v">' + esc(i.value)
                        + (i.unit ? '<span>' + esc(i.unit) + '</span>' : '') + '</div>'
                        + (i.delta ? '<div class="d ' + d + '">' + ar + ' ' + esc(i.delta) + '</div>' : '')
                        + (i.note ? '<div class="n">' + esc(i.note) + '</div>' : '')
                        + '</div>';
                }).join('');

                // 카테고리별 카드
                $('sections').innerHTML = ORDER.map(function (k) {
                    var m = CAT[k], items = (e.categories || {})[k] || [];
                    var cards = items.length ? items.map(function (it, idx) {
                        var u = safeUrl(it.url), s = splitSource(it.source);
                        return '<article class="card">'
                            + '<div class="thumb">'
                            + (it.hot ? '<span class="hot">주목</span>' : '')
                            + '<span class="big">' + m.icon + '</span>'
                            + (s.press ? '<span class="press">' + esc(s.press) + '</span>' : '')
                            + '</div>'
                            + '<div class="card-body">'
                            + '<span class="num">' + ('0' + (idx + 1)).slice(-2) + '</span>'
                            + '<h3>' + esc(it.text) + '</h3>'
                            + '<div class="meta">' + esc(m.name)
                            + (s.when ? ' · ' + esc(s.when) : '') + '</div>'
                            + (u ? '<a class="go" href="' + esc(u) + '" target="_blank" rel="noopener noreferrer">'
                                + '기사 원문 보기 <span class="arw">→</span></a>' : '')
                            + '</div></article>';
                    }).join('') : '<div class="empty">오늘은 이 분야 새 소식이 없습니다</div>';

                    return '<section class="sec" data-k="' + k + '" style="--sec:' + m.c + ';--secsoft:' + m.soft + '">'
                        + '<div class="sec-head"><span class="ic">' + m.icon + '</span>'
                        + '<h2>' + m.name + '</h2>'
                        + '<span class="cnt">' + items.length + '건</span>'
                        + '<span class="rule"></span></div>'
                        + '<div class="grid">' + cards + '</div></section>';
                }).join('');

                var lw = e.lastWeek || [];
                $('lw').innerHTML = lw.length
                    ? lw.map(function (t) { return '<li>' + esc(t) + '</li>'; }).join('')
                    : '<li>기록 없음</li>';
                $('ol').textContent = e.outlook || '-';
            }

            function buildText(e) {
                var o = ['[건설 뉴스 브리핑] ' + fmtDate(e.date), '', '■ 핵심: ' + (e.headline || '-'), ''];
                ORDER.forEach(function (k) {
                    var it = (e.categories || {})[k] || [];
                    if (!it.length) return;
                    o.push('■ ' + CAT[k].name);
                    it.forEach(function (x) {
                        o.push(' - ' + x.text + (x.url ? ' (' + (x.source || '') + ' ' + x.url + ')' : ''));
                    });
                    o.push('');
                });
                if (e.outlook) o.push('■ 다음주 전망: ' + e.outlook);
                return o.join('\n');
            }

            function toast(m) {
                var t = $('toast'); t.textContent = m; t.classList.add('show');
                setTimeout(function () { t.classList.remove('show'); }, 1800);
            }

            if (!DATA.length) {
                $('hl').textContent = 'data.js 를 읽지 못했습니다';
                $('sub').textContent = 'index.html 과 같은 폴더에 data.js 가 있는지 확인하세요.';
                $('dsel').style.display = 'none';
                return;
            }

            DATA.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });

            // 필터 칩
            $('chips').innerHTML = '<button class="chip on" data-f="all">전체</button>'
                + ORDER.map(function (k) {
                    return '<button class="chip" data-f="' + k + '" style="--chipc:' + CAT[k].c + '">'
                        + '<span class="dot" style="background:' + CAT[k].c + '"></span>'
                        + CAT[k].name + '</button>';
                }).join('');

            $('chips').addEventListener('click', function (ev) {
                var b = ev.target.closest('.chip');
                if (!b) return;
                var f = b.getAttribute('data-f');
                Array.prototype.forEach.call($('chips').children, function (c) {
                    c.classList.toggle('on', c === b);
                });
                Array.prototype.forEach.call($('sections').children, function (s) {
                    s.classList.toggle('hide', f !== 'all' && s.getAttribute('data-k') !== f);
                });
            });

            var sel = $('dsel');
            sel.innerHTML = DATA.map(function (e, i) {
                return '<option value="' + i + '">' + fmtDate(e.date) + (i === 0 ? ' · 최신' : '') + '</option>';
            }).join('');
            sel.addEventListener('change', function () { render(DATA[+sel.value]); });

            $('cnt').textContent = '보관 중인 브리핑 ' + DATA.length + '일치';
            $('bprint').addEventListener('click', function () { window.print(); });
            $('bcopy').addEventListener('click', function () {
                var t = buildText(DATA[+sel.value]);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(t).then(
                        function () { toast('요약을 복사했습니다'); },
                        function () { toast('복사 실패 — 브라우저 권한 확인'); });
                } else {
                    var a = document.createElement('textarea');
                    a.value = t; document.body.appendChild(a); a.select();
                    try { document.execCommand('copy'); toast('요약을 복사했습니다'); }
                    catch (x) { toast('복사 실패'); }
                    document.body.removeChild(a);
                }
            });

            render(DATA[0]);
        })();
    </script>
</body>

</html>
