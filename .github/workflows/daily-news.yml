name: 건설 뉴스 보드 자동 갱신

on:
  schedule:
    # cron 은 UTC 기준입니다 (한국시간 -9시간).
    #
    # 실제 기사 발행 시각을 조사한 결과(주요 언론사 261건, 평일 기준):
    #   07시까지 누적 14.9% / 09시 40건 / 10시 29건 / 14시 23건 / 18시까지 92.7%
    #   건설 관련 기사는 14시(17건)와 10시(17건)에 가장 많이 나옴
    #
    # [2026-07-20 조정] 예약이 제때 안 돌아 갱신이 오후 6시를 넘긴 날이 있었습니다.
    # 이 저장소 실측 지연:
    #   07-19 15:30 예정 -> 17:01 (1시간 31분)
    #   07-20 07:00 예정 -> 07:58 (58분)
    #   07-20 15:30 예정 -> 18:42 (3시간 12분)
    # GitHub 예약 실행은 최선노력이라 대기열에 밀립니다. 특히 :00 / :30 은
    # 전 세계 작업이 몰리는 시간대라 가장 오래 밀립니다(우리 크론이 딱 거기였음).
    #
    # 대책 두 가지
    #  (1) 정각·반정각을 피해 한산한 '어중간한 분'으로 옮긴다.
    #  (2) 목표보다 앞당겨 슬롯마다 두 번 건다. 한 번이 밀려도 다른 한 번이 들어온다.
    #      (매 실행이 항상 커밋하므로 늦게 들어온 쪽이 최신으로 덮어씁니다)
    - cron: "47 19 * * *"    # 04:47 KST - 아침 1차 (한산한 시간대, 지연 여유 최대)
    - cron: "23 21 * * *"    # 06:23 KST - 아침 2차 (1차가 밀렸을 때 보정)
    - cron: "7 6 * * 1-5"    # 15:07 KST 평일 - 오후 1차 (14시 건설 피크 직후)
    - cron: "41 7 * * 1-5"   # 16:41 KST 평일 - 오후 2차
  workflow_dispatch: # Actions 탭에서 수동 실행용

# data.js 를 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # secrets 컨텍스트는 step 의 if 조건에서 쓸 수 없어 job 레벨 env 로 올립니다.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 준비
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 아침·오후 모두 항상 갱신하고 커밋합니다.
      # (오후 화면이 "몇 시 기준"인지 사용자가 알 수 있어야 하므로,
      #  기사가 그대로여도 갱신 시각은 최신으로 유지합니다)
      - name: 뉴스 수집 및 data.js 생성
        id: build
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
        run: |
          rm -f email.html notify.txt
          python scripts/build_news.py
          echo "updated=yes" >> "$GITHUB_OUTPUT"

      - name: 변경사항 커밋
        if: steps.build.outputs.updated == 'yes'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 데이터 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi

      - name: 메일 제목 준비
        id: headline
        if: steps.build.outputs.updated == 'yes'
        run: |
          {
            echo 'text<<__EOF__'
            cat notify.txt
            echo
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      # 메일 발송 — 시크릿 3개가 설정된 경우에만 동작합니다.
      # MAIL_USERNAME / MAIL_PASSWORD(Gmail 앱 비밀번호) / MAIL_TO
      - name: 브리핑 메일 발송
        if: env.MAIL_USERNAME != '' && steps.build.outputs.updated == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: 건설뉴스 보드
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.headline.outputs.text }}
          html_body: file://email.html
          convert_markdown: false
