name: 건설 뉴스 보드 자동 갱신

on:
  schedule:
    # GitHub Actions 의 cron 은 UTC 기준입니다.
    # 22:30 UTC = 한국시간 07:30. GitHub 스케줄은 혼잡 시 5~20분 밀릴 수 있어
    # 8시 전에 확실히 끝나도록 30분 여유를 뒀습니다.
    - cron: "30 22 * * *"
  workflow_dispatch: # Actions 탭에서 수동 실행용

# data.js 를 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # secrets 컨텍스트는 step 의 if 조건에서 쓸 수 없어 job 레벨 env 로 올립니다.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 뉴스 수집 및 data.js 생성
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
        run: python scripts/build_news.py

      - name: 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 데이터 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi

      - name: 메일 제목 준비
        id: headline
        run: |
          {
            echo 'text<<__EOF__'
            cat notify.txt
            echo
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      # 메일 발송 — 시크릿 3개가 설정된 경우에만 동작합니다.
      # MAIL_USERNAME / MAIL_PASSWORD(Gmail 앱 비밀번호) / MAIL_TO
      - name: 브리핑 메일 발송
        if: env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: 건설뉴스 보드
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.headline.outputs.text }}
          html_body: file://email.html
          convert_markdown: false
